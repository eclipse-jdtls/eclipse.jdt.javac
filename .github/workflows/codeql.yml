name: CodeQL call

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  schedule:
    - cron: '15 8 * * 1'

jobs:
  CodeQL:
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      packages: read
      actions: read
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          repository: eclipse-jdt/eclipse.jdt.ui
          path: eclipse.jdt.ui
      - uses: actions/checkout@v4
        with:
          path: eclipse.jdt.javac
      - name: Set up JDK 26 and 21 for x64
        uses: actions/setup-java@v4
        with:
          java-version: '26'
          distribution: 'temurin'
          architecture: x64
          cache: maven
      - name: Install jdt.ui tests
        run: mvn install --batch-mode  -Dtycho.buildqualifier.format="'z'yyyyMMdd-HHmm" -Dproject.build.sourceEncoding=UTF-8 -DskipTests -pl org.eclipse.jdt.ui.tests -am
        working-directory: eclipse.jdt.ui
      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: java-kotlin
          build-mode: manual
      - name: Build the code
        run: mvn --batch-mode --update-snapshots compile
        working-directory: eclipse.jdt.javac
      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:java-kotlin"
